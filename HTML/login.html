<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/CSS/login.css">
</head>

<body>
    <nav class="nav">
        <div class="nav1">
            <a href="#" class="NovaCart"><b>NovaCart</b></a>
            <a href="#" class="Shop">Shop</a>
            <a href="#" class="About">About</a>
        </div>
        <div class="nav2">
            <button class="nlb" id="l" >Login</button>
            <button class="nrb" id="r">Register</button>
        </div>
    </nav>
    <section class="login">
        <div class="login1">
            <p class="l1">WELCOME BACK</p>
            <p class="l2"><b>Access your cart and <br>continue shoping faster.<b></b></p>
            <p class="l1">Your demo account is stored locally in this browser for<br> portfolio and learning use.</p>
        </div>
        <div class="login2">
            <form id="loginForm" method="get" >
                <h3>Login</h3>
                <p>Enter your register email and password.</p>
                <label for="email">Email address</label><br>
                <input type="email" class="email" id="email" name="email"><br>
                <label for="password">Password</label><br>
                <input type="password" class="password" id="pass" name="password"><br>
                <div class="rc">
                    <div class="rem">
                        <input type="checkbox" class="checkbox" id="check">
                        <span>Remember me</span>
                    </div>
                    <a href="/HTML/register.html" class="create">Create account</a>
                </div>
                <button class="login_btn" type="submit">Login</button>
            </form>
        </div>
    </section>
    <script src="../JS/login.js"></script>
</body>

</html>
