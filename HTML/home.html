<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homes</title>
    <link rel="stylesheet" href="/CSS/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
    <nav class="nav">
        <div class="nav1">
            <a href="../HTML/home.html" class="NovaCart"><b>NovaCart</b></a>
            <a href="../HTML/home.html" class="Shop">Shop</a>
            <a href="../HTML/about.html" class="About">About</a>
        </div>
        <div class="nav2">
            <input type="text" id="searchInput" placeholder="Search product">

            <button class="nsb" id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

            <select class="ns" id="categoryFilter">
                <option value="all" class="ns1">All Categories</option>
            </select>

            <button class="nlb" id="l">Login</button>
            <button class="nrb" id="r">Register</button>
            <button class="ncb">
                <i class="fa-solid fa-bag-shopping"></i>
            </button>
        </div>
    </nav>
    <section class="main">
        <div class="main1">
            <p class="m_p1">NEW COLLECTION</p>
            <P class="m_p2"><b>Shop reliable products for <br>everyday work and life.</b></P>
            <p class="m_p3">Curated electronics, fashion, home goods and accessories with a fast local cart
                <br>experience.
            </p>
        </div>
        <div class="main2">
            <div class="m_div">
                <h4>50</h4>
                <p>Products</p>
            </div>
            <div class="m_div">
                <h4>5</h4>
                <p>Pages</p>
            </div>
            <div class="m_div">
                <h4>20h</h4>
                <p>Dispatch</p>
            </div>
        </div>
    </section>
    <section class="product">
        <div class="product1">
            <h4>Products</h4>
            <p id="productCount">Showing 1-10 of 50 products</p>
        </div>

        <div class="product2">
            <select id="ratingFilter">
                <option value="all">Featured</option>
                <option value="4">Above 4 ⭐</option>
                <option value="3">Above 3 ⭐</option>
                <option value="2">Above 2 ⭐</option>
            </select>
        </div>
    </section>
    <section class="item_grid" id="productContainer"></section>
    <div class="pagination">
        <button id="prevBtn">Prev</button>
        <span id="pageNumber">1</span>
        <button id="nextBtn">Next</button>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button id="closeCart">X</button>
        </div>

        <div id="cartItems"></div>
        <div class="cart-footer" id="cartTotal"></div>
    </div>
    <script src="/JS/home.js"></script>
</body>

</html>
